# nu-ServiceDesk 개발 환경
# Design V2.1 기준: PostgreSQL 15+ / Redis 7+

services:
  postgres:
    image: postgres:15-alpine
    container_name: nusd-postgres
    environment:
      POSTGRES_DB: nusd
      POSTGRES_USER: nusd
      POSTGRES_PASSWORD: nusd_dev_2026
      TZ: Asia/Seoul
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nusd"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nusd-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
