<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - nu-ServiceDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="common.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
    .login-card { max-width: 420px; width: 100%; border-radius: 1rem; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .login-logo { font-size: 1.5rem; font-weight: 800; color: var(--bs-primary); }
    .login-subtitle { font-size: 0.85rem; color: #868e96; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5">
        <div class="card login-card border-0">
          <div class="card-body p-4 p-md-5">

            <!-- 로고 -->
            <div class="text-center mb-4">
              <div class="login-logo mb-1">
                <i class="bi bi-headset me-2"></i>nu-ServiceDesk
              </div>
              <p class="login-subtitle">한국 기업을 위한 서비스데스크</p>
            </div>

            <!-- 에러 메시지 (로그인 실패 시) -->
            <div class="alert alert-danger d-none" id="loginError">
              <i class="bi bi-exclamation-triangle-fill me-1"></i>
              <span>아이디 또는 비밀번호가 올바르지 않습니다.</span>
            </div>

            <!-- 잠금 경고 -->
            <div class="alert alert-warning d-none" id="lockWarning">
              <i class="bi bi-lock-fill me-1"></i>
              <span>5회 연속 실패로 계정이 잠겼습니다. <strong>14:23</strong>에 해제됩니다.</span>
            </div>

            <!-- 로그인 폼 -->
            <form>
              <div class="mb-3">
                <label for="loginId" class="form-label fw-semibold">아이디</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input type="text" class="form-control" id="loginId" placeholder="아이디를 입력하세요" autofocus>
                </div>
              </div>

              <div class="mb-4">
                <label for="password" class="form-label fw-semibold">비밀번호</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control" id="password" placeholder="비밀번호를 입력하세요">
                  <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" style="min-height:44px">
                <i class="bi bi-box-arrow-in-right me-1"></i>로그인
              </button>
            </form>

            <div class="text-center mt-3">
              <small class="text-muted">비밀번호를 잊으셨나요? 관리자에게 문의하세요.</small>
            </div>

          </div>
        </div>

        <div class="text-center mt-3">
          <small class="text-white-50">&copy; 2026 nu-ServiceDesk. All rights reserved.</small>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 비밀번호 표시/숨기기 토글
    document.getElementById('togglePassword').addEventListener('click', function() {
      const pw = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
    });
  </script>
</body>
</html>
